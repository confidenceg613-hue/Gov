kind = "web"
previewPath = "/"
title = "My Wife"
version = "1.0.0"
id = "artifacts/my-wife"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19818

[services.development]
run = "pnpm --filter @workspace/my-wife run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/my-wife", "run", "build" ]
publicDir = "artifacts/my-wife/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19818"
BASE_PATH = "/"
